<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드 — 최동진 박사</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1A3A5C; --accent: #2E86C1;
      --bg: #F8F9FA; --white: #fff; --text: #2C3E50;
      --border: #D6E4F0; --danger: #e74c3c; --success: #27ae60;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }

    /* ── 로그인 화면 ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0d2137, #1A3A5C);
    }
    .login-card {
      background: var(--white); border-radius: 16px; padding: 48px 40px;
      text-align: center; width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo { font-size: 2.5rem; margin-bottom: 12px; }
    .login-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .login-sub { font-size: 0.85rem; color: #6c8aab; margin-bottom: 32px; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px; border-radius: 8px;
      background: var(--white); border: 2px solid var(--border);
      font-size: 0.95rem; font-weight: 600; cursor: pointer; color: var(--text);
      transition: border-color .2s, box-shadow .2s;
    }
    .btn-google:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(46,134,193,0.2); }
    .btn-google svg { width: 20px; height: 20px; }
    #loginError { color: var(--danger); font-size: 0.83rem; margin-top: 12px; display: none; }

    /* ── 대시보드 ── */
    #dashboard { display: none; }

    header {
      background: var(--primary); color: var(--white);
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-weight: 700; font-size: 1rem; }
    .header-user { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; }
    .btn-logout {
      padding: 6px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.4);
      background: transparent; color: var(--white); cursor: pointer; font-size: 0.83rem;
      transition: background .2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.1); }

    .dash-body { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* 통계 카드 */
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 36px; }
    .stat-card {
      background: var(--white); border-radius: 12px; padding: 24px;
      box-shadow: 0 2px 12px rgba(26,58,92,0.08);
      border-top: 4px solid var(--accent);
    }
    .stat-num { font-size: 2rem; font-weight: 700; color: var(--primary); font-family: 'Inter', sans-serif; }
    .stat-label { font-size: 0.8rem; color: #6c8aab; margin-top: 4px; }

    /* 탭 */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
    .tab-btn {
      padding: 10px 20px; border: none; background: transparent;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; color: #6c8aab;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .2s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 테이블 */
    .table-wrap { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(26,58,92,0.08); }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--primary); color: var(--white); padding: 12px 16px; text-align: left; font-size: 0.83rem; }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.87rem; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f7ff; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-new { background: #dff5e3; color: var(--success); }
    .badge-read { background: #f0f0f0; color: #999; }
    .btn-read {
      padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--white); cursor: pointer; font-size: 0.78rem; color: var(--text);
      transition: background .2s;
    }
    .btn-read:hover { background: var(--bg); }
    .btn-delete {
      padding: 4px 12px; border-radius: 6px; border: 1px solid #fcc;
      background: #fff5f5; cursor: pointer; font-size: 0.78rem; color: var(--danger);
    }
    .btn-delete:hover { background: #feeaea; }

    /* 방문자 차트 영역 */
    .visit-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .info-card {
      background: var(--white); border-radius: 12px; padding: 24px;
      box-shadow: 0 2px 12px rgba(26,58,92,0.08);
    }
    .info-card h3 { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin-bottom: 16px; }
    .visit-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.87rem; }
    .visit-row:last-child { border-bottom: none; }
    .visit-num { font-weight: 700; color: var(--accent); font-family: 'Inter', sans-serif; }

    /* 콘텐츠 관리 */
    .content-form {
      background: var(--white); border-radius: 12px; padding: 28px;
      box-shadow: 0 2px 12px rgba(26,58,92,0.08); margin-bottom: 20px;
    }
    .content-form h3 { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--primary); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.87rem; outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group.full { grid-column: 1 / -1; }
    .btn-save {
      background: var(--accent); color: var(--white);
      padding: 10px 24px; border-radius: 8px; border: none;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 16px;
      transition: background .2s;
    }
    .btn-save:hover { background: #2475a8; }

    #toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--primary); color: var(--white);
      padding: 12px 24px; border-radius: 8px;
      font-size: 0.87rem; opacity: 0; transition: opacity .3s;
      pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; }

    .empty-msg { text-align: center; padding: 48px; color: #aaa; font-size: 0.9rem; }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .visit-summary { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── 로그인 화면 ───────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">최동진 박사 홈페이지 관리 시스템</div>
    <button class="btn-google" id="btnGoogleLogin">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google 계정으로 로그인
    </button>
    <div id="loginError">관리자 계정이 아닙니다. 접근이 거부되었습니다.</div>
  </div>
</div>

<!-- ── 대시보드 ────────────────────────────────── -->
<div id="dashboard">
  <header>
    <div class="header-title">📊 최동진 박사 — 관리자 대시보드</div>
    <div class="header-user">
      <span id="adminEmail"></span>
      <button class="btn-logout" id="btnLogout">로그아웃</button>
    </div>
  </header>

  <div class="dash-body">

    <!-- 통계 카드 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="statContacts">—</div>
        <div class="stat-label">총 문의 수</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statNew">—</div>
        <div class="stat-label">미확인 문의</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statVisits">—</div>
        <div class="stat-label">총 방문 수</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statToday">—</div>
        <div class="stat-label">오늘 방문 수</div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="contacts">📩 문의 내역</button>
      <button class="tab-btn" data-tab="visits">📈 방문자 통계</button>
      <button class="tab-btn" data-tab="lectures">🎤 강의 관리</button>
      <button class="tab-btn" data-tab="books">📚 저서 관리</button>
    </div>

    <!-- 문의 내역 탭 -->
    <div class="tab-panel active" id="tab-contacts">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>상태</th><th>이름</th><th>소속</th><th>연락처</th>
              <th>문의 유형</th><th>내용</th><th>접수일시</th><th>관리</th>
            </tr>
          </thead>
          <tbody id="contactsBody">
            <tr><td colspan="8" class="empty-msg">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 방문자 통계 탭 -->
    <div class="tab-panel" id="tab-visits">
      <div class="visit-summary">
        <div class="info-card">
          <h3>최근 7일 방문 현황</h3>
          <div id="visitList"><div class="empty-msg">불러오는 중...</div></div>
        </div>
        <div class="info-card">
          <h3>유입 경로</h3>
          <div id="refererList"><div class="empty-msg">불러오는 중...</div></div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>방문일시</th><th>페이지</th><th>유입 경로</th><th>기기</th></tr>
          </thead>
          <tbody id="visitsBody">
            <tr><td colspan="4" class="empty-msg">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 강의 관리 탭 -->
    <div class="tab-panel" id="tab-lectures">
      <div class="content-form">
        <h3>강의 이력 추가</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>일시</label>
            <input type="text" id="lec-date" placeholder="예: 2024.06.15" />
          </div>
          <div class="form-group">
            <label>주관기관</label>
            <input type="text" id="lec-org" placeholder="예: KISA, 중소벤처기업부" />
          </div>
          <div class="form-group full">
            <label>강의명 / 행사명</label>
            <input type="text" id="lec-title" placeholder="예: 생성형 AI 활용 실무 교육" />
          </div>
          <div class="form-group full">
            <label>강의 분야</label>
            <select id="lec-category">
              <option value="생성형AI">생성형 AI</option>
              <option value="정보보안">정보보안</option>
              <option value="IT전략">IT 전략</option>
              <option value="PM">Project Management</option>
              <option value="AI리터러시">AI 리터러시</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>
        <button class="btn-save" id="btnAddLecture">강의 이력 저장</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>일시</th><th>강의명</th><th>주관</th><th>분야</th><th>관리</th></tr>
          </thead>
          <tbody id="lecturesBody">
            <tr><td colspan="5" class="empty-msg">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 저서 관리 탭 -->
    <div class="tab-panel" id="tab-books">
      <div class="content-form">
        <h3>저서 추가</h3>
        <div class="form-grid">
          <div class="form-group full">
            <label>제목</label>
            <input type="text" id="book-title" placeholder="예: GEO: Generative Engine Optimization" />
          </div>
          <div class="form-group full">
            <label>설명</label>
            <input type="text" id="book-desc" placeholder="예: 생성형 AI에게 추천받는 비법 공개" />
          </div>
          <div class="form-group">
            <label>출판연도</label>
            <input type="text" id="book-year" placeholder="예: 2024" />
          </div>
          <div class="form-group">
            <label>출판사</label>
            <input type="text" id="book-publisher" placeholder="예: 한빛미디어" />
          </div>
        </div>
        <button class="btn-save" id="btnAddBook">저서 저장</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>제목</th><th>설명</th><th>출판연도</th><th>출판사</th><th>관리</th></tr>
          </thead>
          <tbody id="booksBody">
            <tr><td colspan="5" class="empty-msg">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /dash-body -->
</div><!-- /dashboard -->

<div id="toast"></div>

<!-- ── Firebase SDK ──────────────────────────── -->
<script src="firebase-config.js"></script>
<script type="module">
  import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                                  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc,
           query, orderBy, limit, where, Timestamp }
                                                  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ── 초기화 ─────────────────────────────────────────────
  const app  = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // ── 유틸 ───────────────────────────────────────────────
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  function fmtDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString('ko-KR');
  }
  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // ── 인증 상태 감지 ──────────────────────────────────────
  onAuthStateChanged(auth, user => {
    if (user && user.email === ADMIN_EMAIL) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display   = 'block';
      document.getElementById('adminEmail').textContent    = user.email;
      loadAll();
    } else if (user) {
      signOut(auth);
      document.getElementById('loginError').style.display = 'block';
    }
  });

  // ── 로그인 ─────────────────────────────────────────────
  document.getElementById('btnGoogleLogin').addEventListener('click', async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { console.error(e); }
  });

  // ── 로그아웃 ───────────────────────────────────────────
  document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

  // ── 탭 전환 ────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── 전체 데이터 로드 ───────────────────────────────────
  async function loadAll() {
    await Promise.all([loadContacts(), loadVisits(), loadLectures(), loadBooks()]);
  }

  // ── 문의 내역 ──────────────────────────────────────────
  async function loadContacts() {
    const snap = await getDocs(query(collection(db,'contacts'), orderBy('createdAt','desc')));
    const rows = []; let newCount = 0;
    snap.forEach(d => {
      const r = { id: d.id, ...d.data() };
      if (!r.read) newCount++;
      rows.push(r);
    });
    document.getElementById('statContacts').textContent = rows.length;
    document.getElementById('statNew').textContent      = newCount;

    const tbody = document.getElementById('contactsBody');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty-msg">문의가 없습니다</td></tr>'; return; }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><span class="badge ${r.read ? 'badge-read' : 'badge-new'}">${r.read ? '확인' : '신규'}</span></td>
        <td>${r.name || '—'}</td>
        <td>${r.org || '—'}</td>
        <td>${r.tel || '—'}</td>
        <td>${r.type || '—'}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.message || '—'}</td>
        <td style="white-space:nowrap;">${fmtDate(r.createdAt)}</td>
        <td style="white-space:nowrap;">
          <button class="btn-read" onclick="markRead('${r.id}')">확인</button>
          <button class="btn-delete" onclick="delContact('${r.id}')">삭제</button>
        </td>
      </tr>`).join('');
  }

  window.markRead = async (id) => {
    await updateDoc(doc(db,'contacts',id), { read: true });
    toast('확인 처리됐습니다'); loadContacts();
  };
  window.delContact = async (id) => {
    if (!confirm('삭제하시겠습니까?')) return;
    await deleteDoc(doc(db,'contacts',id));
    toast('삭제됐습니다'); loadContacts();
  };

  // ── 방문자 통계 ────────────────────────────────────────
  async function loadVisits() {
    const snap = await getDocs(query(collection(db,'visits'), orderBy('visitedAt','desc'), limit(200)));
    const rows = []; const byDate = {}; const byRef = {}; let todayCount = 0;
    const today = todayKey();

    snap.forEach(d => {
      const r = { id: d.id, ...d.data() };
      rows.push(r);
      const dk = r.dateKey || '—';
      byDate[dk] = (byDate[dk] || 0) + 1;
      const ref = r.referrer || '직접 방문';
      byRef[ref] = (byRef[ref] || 0) + 1;
      if (dk === today) todayCount++;
    });

    document.getElementById('statVisits').textContent = rows.length;
    document.getElementById('statToday').textContent  = todayCount;

    // 최근 7일
    const last7 = Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);
    document.getElementById('visitList').innerHTML = last7.length
      ? last7.map(([d,c])=>`<div class="visit-row"><span>${d}</span><span class="visit-num">${c}회</span></div>`).join('')
      : '<div class="empty-msg">데이터 없음</div>';

    // 유입 경로
    const refs = Object.entries(byRef).sort((a,b)=>b[1]-a[1]).slice(0,5);
    document.getElementById('refererList').innerHTML = refs.length
      ? refs.map(([r,c])=>`<div class="visit-row"><span style="overflow:hidden;text-overflow:ellipsis;max-width:180px;">${r}</span><span class="visit-num">${c}회</span></div>`).join('')
      : '<div class="empty-msg">데이터 없음</div>';

    const tbody = document.getElementById('visitsBody');
    tbody.innerHTML = rows.slice(0,50).map(r => `
      <tr>
        <td>${fmtDate(r.visitedAt)}</td>
        <td>${r.page || '/'}</td>
        <td>${r.referrer || '직접 방문'}</td>
        <td>${r.device || '—'}</td>
      </tr>`).join('') || '<tr><td colspan="4" class="empty-msg">방문 기록이 없습니다</td></tr>';
  }

  // ── 강의 관리 ──────────────────────────────────────────
  async function loadLectures() {
    const snap = await getDocs(query(collection(db,'lectures'), orderBy('date','desc')));
    const rows = [];
    snap.forEach(d => rows.push({ id: d.id, ...d.data() }));

    const tbody = document.getElementById('lecturesBody');
    tbody.innerHTML = rows.length
      ? rows.map(r => `<tr>
          <td>${r.date||'—'}</td>
          <td>${r.title||'—'}</td>
          <td>${r.org||'—'}</td>
          <td>${r.category||'—'}</td>
          <td><button class="btn-delete" onclick="delLecture('${r.id}')">삭제</button></td>
        </tr>`).join('')
      : '<tr><td colspan="5" class="empty-msg">강의 이력이 없습니다</td></tr>';
  }

  document.getElementById('btnAddLecture').addEventListener('click', async () => {
    const data = {
      date:     document.getElementById('lec-date').value.trim(),
      title:    document.getElementById('lec-title').value.trim(),
      org:      document.getElementById('lec-org').value.trim(),
      category: document.getElementById('lec-category').value,
      createdAt: Timestamp.now()
    };
    if (!data.title) { toast('강의명을 입력하세요'); return; }
    await addDoc(collection(db,'lectures'), data);
    toast('강의 이력이 저장됐습니다');
    ['lec-date','lec-title','lec-org'].forEach(id => document.getElementById(id).value='');
    loadLectures();
  });

  window.delLecture = async (id) => {
    if (!confirm('삭제하시겠습니까?')) return;
    await deleteDoc(doc(db,'lectures',id));
    toast('삭제됐습니다'); loadLectures();
  };

  // ── 저서 관리 ──────────────────────────────────────────
  async function loadBooks() {
    const snap = await getDocs(query(collection(db,'books'), orderBy('year','desc')));
    const rows = [];
    snap.forEach(d => rows.push({ id: d.id, ...d.data() }));

    const tbody = document.getElementById('booksBody');
    tbody.innerHTML = rows.length
      ? rows.map(r => `<tr>
          <td>${r.title||'—'}</td>
          <td>${r.desc||'—'}</td>
          <td>${r.year||'—'}</td>
          <td>${r.publisher||'—'}</td>
          <td><button class="btn-delete" onclick="delBook('${r.id}')">삭제</button></td>
        </tr>`).join('')
      : '<tr><td colspan="5" class="empty-msg">저서가 없습니다</td></tr>';
  }

  document.getElementById('btnAddBook').addEventListener('click', async () => {
    const data = {
      title:     document.getElementById('book-title').value.trim(),
      desc:      document.getElementById('book-desc').value.trim(),
      year:      document.getElementById('book-year').value.trim(),
      publisher: document.getElementById('book-publisher').value.trim(),
      createdAt: Timestamp.now()
    };
    if (!data.title) { toast('제목을 입력하세요'); return; }
    await addDoc(collection(db,'books'), data);
    toast('저서가 저장됐습니다');
    ['book-title','book-desc','book-year','book-publisher'].forEach(id => document.getElementById(id).value='');
    loadBooks();
  });

  window.delBook = async (id) => {
    if (!confirm('삭제하시겠습니까?')) return;
    await deleteDoc(doc(db,'books',id));
    toast('삭제됐습니다'); loadBooks();
  };

</script>
</body>
</html>
